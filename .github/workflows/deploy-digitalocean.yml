name: deploy-vps

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load project variables
        run: |
          if [ -f .project.env ]; then
            set -a
            . ./.project.env
            set +a
          fi

          APP_NAME="${APP_NAME:-${GITHUB_REPOSITORY##*/}}"
          APP_BIND_PORT="${APP_BIND_PORT:-8080}"
          PUBLIC_PORT="${PUBLIC_PORT:-80}"
          SERVER_NAME="${SERVER_NAME:-_}"

          echo "APP_NAME=${APP_NAME}" >> "$GITHUB_ENV"
          echo "APP_DIR=/opt/${APP_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${APP_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_URI=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${APP_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "APP_BIND_PORT=${APP_BIND_PORT}" >> "$GITHUB_ENV"
          echo "PUBLIC_PORT=${PUBLIC_PORT}" >> "$GITHUB_ENV"
          echo "SERVER_NAME=${SERVER_NAME}" >> "$GITHUB_ENV"

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_URI }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose and nginx config to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          APP_BIND_PORT: ${{ env.APP_BIND_PORT }}
          PUBLIC_PORT: ${{ env.PUBLIC_PORT }}
          SERVER_NAME: ${{ env.SERVER_NAME }}
        run: |
          ssh -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "mkdir -p \"${APP_DIR}\""
          scp -P "${VPS_PORT:-22}" deploy/vps/docker-compose.vps.yml "$VPS_USER@$VPS_HOST:${APP_DIR}/docker-compose.vps.yml"
          envsubst '${APP_NAME} ${APP_BIND_PORT} ${PUBLIC_PORT} ${SERVER_NAME}' < deploy/vps/nginx/site.conf.template > .site.conf
          scp -P "${VPS_PORT:-22}" .site.conf "$VPS_USER@$VPS_HOST:/tmp/${APP_NAME}.conf"

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          IMAGE_URI: ${{ env.IMAGE_URI }}
          APP_BIND_PORT: ${{ env.APP_BIND_PORT }}
          PUBLIC_PORT: ${{ env.PUBLIC_PORT }}
          SERVER_NAME: ${{ env.SERVER_NAME }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          printf '%s\n' \
            "POSTGRES_USER=${POSTGRES_USER}" \
            "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" \
            "POSTGRES_DB=${POSTGRES_DB}" \
            "APP_BIND_PORT=${APP_BIND_PORT}" \
            "PUBLIC_PORT=${PUBLIC_PORT}" \
            "SERVER_NAME=${SERVER_NAME}" \
            "FLASK_SECRET_KEY=${FLASK_SECRET_KEY}" \
            "IMAGE=${IMAGE_URI}" > .vps.env

          scp -P "${VPS_PORT:-22}" .vps.env "$VPS_USER@$VPS_HOST:${APP_DIR}/.env"

          ssh -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "
            set -euo pipefail
            cd '${APP_DIR}'
            echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin
            IMAGE='${IMAGE_URI}' docker compose --env-file .env -f docker-compose.vps.yml pull
            IMAGE='${IMAGE_URI}' docker compose --env-file .env -f docker-compose.vps.yml up -d --remove-orphans
            docker image prune -af --filter 'until=24h' || true

            sudo mv '/tmp/${APP_NAME}.conf' '/etc/nginx/conf.d/${APP_NAME}.conf'
            sudo nginx -t
            sudo nginx -s reload || sudo systemctl reload nginx
          "

          rm -f .vps.env
          rm -f .site.conf
